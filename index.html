<!DOCTYPE html>
<html>
  <head>
    <title>JOke Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <meta charset="UTF-8" />
    
</head>

<body>
  <div class="container">
    <header>
      
    <h1>Joke Generator</h1>
    </header>
    <main>
    <div class="form-container">
      <form>
        <input type="text" 
        class="topic-input"
        placeholder="Enter a topic for a joke..." 
        autocomplete="off"
        autoFocus
        />
        

        <br />
        <button type="submit">Generate Joke</button>
      </form>
    </div>
    <div class="joke-container" id="joke">
      Joke will be here
    </div>
    </main>
    <footer>
      <p>Coded with ❤️ by
        <a href="https://github.com" target="_blank">Khanina Nataliia</a>
        open-sourced on
        <a href="" target="_blank">GitHub</a>
        and hosted on
        <a href="" target="_blank">Netlify</a>
      </p>
    </footer>
  </div>
  </body>

    <script src="src/index.js"></script>
  </body>
</html>
